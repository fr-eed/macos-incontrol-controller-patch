name: Build

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      dmg-artifact:
        description: "Name of the artifact containing the DMG"
        value: ${{ jobs.build.outputs.dmg-artifact }}
      zip-artifact:
        description: "Name of the artifact containing the ZIP"
        value: ${{ jobs.build.outputs.zip-artifact }}

jobs:
  build:
    runs-on: macos-latest
    outputs:
      dmg-artifact: ${{ steps.artifacts.outputs.dmg-artifact }}
      zip-artifact: ${{ steps.artifacts.outputs.zip-artifact }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build app
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.9'
        run: |
          pyinstaller --onefile --windowed \
            --name "Steam Input Controller Patch" \
            --add-data "patch.py:." \
            --target-arch universal2 \
            patch_gui.py

      - name: Create DMG
        run: |
          brew install create-dmg
          # Stage files for DMG
          mkdir -p dmg-contents
          cp -r "dist/Steam Input Controller Patch.app" dmg-contents/
          cp release-files/INSTALL.txt dmg-contents/
          create-dmg \
            --volname "Steam Input Controller Patch" \
            --window-size 500 300 \
            --icon-size 80 \
            --icon "Steam Input Controller Patch.app" 100 120 \
            --icon "INSTALL.txt" 300 120 \
            "SteamInputControllerPatch.dmg" \
            dmg-contents

      - name: Create ZIP
        run: |
          cp release-files/INSTALL.txt .
          zip SteamInputControllerPatch.zip SteamInputControllerPatch.dmg INSTALL.txt

      - name: Export artifact names
        id: artifacts
        run: |
          echo "dmg-artifact=SteamInputControllerPatch-dmg" >> "$GITHUB_OUTPUT"
          echo "zip-artifact=SteamInputControllerPatch-zip" >> "$GITHUB_OUTPUT"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: SteamInputControllerPatch-dmg
          path: SteamInputControllerPatch.dmg

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v7
        with:
          name: SteamInputControllerPatch-zip
          path: SteamInputControllerPatch.zip
