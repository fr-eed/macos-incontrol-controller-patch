name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/build.yml

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download DMG artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.dmg-artifact }}
          path: assets

      - name: Download ZIP artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.zip-artifact }}
          path: assets

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: assets/*
          generate_release_notes: true
